<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Candidate Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <main class="login-page">

        <div class="login-container">

            <div class="login-header">

                <p class="project-label">
                    CANDIDATE LOGIN
                </p>

                <h1>Welcome Back</h1>

                <p class="login-description">
                    Enter your registered details to continue to the examination portal.
                </p>

            </div>

            <form
                action="{{ url_for('login') }}"
                method="POST"
                class="login-form">

                <div class="form-group">

                    <label for="email">
                        Email Address <span class="required">*</span>
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your registered email"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="password">
                        Password <span class="required">*</span>
                    </label>

                    <div class="password-field">

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        >

                        <button
                            type="button"
                            class="password-eye"
                            onclick="togglePassword(this)"
                            aria-label="Show password">

                            <svg
                                class="eye-open"
                                xmlns="http://www.w3.org/2000/svg"
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round">

                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12"></path>
                                <circle cx="12" cy="12" r="3"></circle>

                            </svg>

                            <svg
                                class="eye-closed"
                                xmlns="http://www.w3.org/2000/svg"
                                width="20"
                                height="20"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round">

                                <path d="M3 3l18 18"></path>
                                <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
                                <path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a17 17 0 0 1-2.1 3.2"></path>
                                <path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a9.8 9.8 0 0 0 4.1-.9"></path>

                            </svg>

                        </button>

                    </div>

                </div>

                <div class="captcha-section">

                    <label for="captcha">
                        Security Verification <span class="required">*</span>
                    </label>

                    <div class="captcha-row">

                        <div class="captcha-code">
                            {{ captcha }}
                        </div>

                        <input
                            type="text"
                            id="captcha"
                            name="captcha"
                            placeholder="Enter CAPTCHA"
                            autocomplete="off"
                            required
                        >

                    </div>

                    <p class="captcha-help">
                        Enter the characters shown above.
                    </p>

                </div>

                <button
                    type="submit"
                    class="login-submit">

                    Login

                </button>

            </form>

            <div class="login-footer">

                <p>
                    New candidate?
                    <a href="{{ url_for('register_page') }}">
                        Register here
                    </a>
                </p>

                <a
                    href="{{ url_for('exam_entry') }}"
                    class="back-link">

                    ← Back to Exam Portal

                </a>

            </div>

        </div>

    </main>


    <script>

        function togglePassword(button) {

            const passwordInput =
                document.getElementById("password");

            const eyeOpen =
                button.querySelector(".eye-open");

            const eyeClosed =
                button.querySelector(".eye-closed");


            if (passwordInput.type === "password") {

                passwordInput.type = "text";

                eyeOpen.style.display = "none";
                eyeClosed.style.display = "block";

                button.setAttribute(
                    "aria-label",
                    "Hide password"
                );

            } else {

                passwordInput.type = "password";

                eyeOpen.style.display = "block";
                eyeClosed.style.display = "none";

                button.setAttribute(
                    "aria-label",
                    "Show password"
                );

            }

        }

    </script>

</body>

</html>

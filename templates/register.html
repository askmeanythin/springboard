<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

```
<title>Candidate Registration</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">
```

</head>

<body>

```
<main class="register-page">

    <div class="register-container">

        <div class="register-header">

            <p class="project-label">CANDIDATE REGISTRATION</p>

            <h1>Create Your Account</h1>

            <p class="register-description">
                Enter your details to register for the online examination.
            </p>

        </div>

        <form action="{{ url_for('register') }}"
              method="POST"
              class="register-form">

            <div class="name-row">

                <div class="form-group">

                    <label for="first_name">
                        First Name <span class="required">*</span>
                    </label>

                    <input
                        type="text"
                        id="first_name"
                        name="first_name"
                        placeholder="First name"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="middle_name">
                        Middle Name
                    </label>

                    <input
                        type="text"
                        id="middle_name"
                        name="middle_name"
                        placeholder="Middle name"
                    >

                </div>

                <div class="form-group">

                    <label for="last_name">
                        Last Name <span class="required">*</span>
                    </label>

                    <input
                        type="text"
                        id="last_name"
                        name="last_name"
                        placeholder="Last name"
                        required
                    >

                </div>

            </div>

            <div class="form-group">

                <label for="email">
                    Email Address <span class="required">*</span>
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email address"
                    required
                >

            </div>

            <div class="password-row">

                <div class="form-group">

                    <label for="password">
                        Password <span class="required">*</span>
                    </label>

                    <div class="password-field">

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Create password"
                            required
                        >

                        <button
                            type="button"
                            class="password-eye"
                            onclick="togglePassword(this)"
                            aria-label="Show password"
                        >

                            <svg class="eye-open"
                                 xmlns="http://www.w3.org/2000/svg"
                                 width="20"
                                 height="20"
                                 viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 stroke-linecap="round"
                                 stroke-linejoin="round">

                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12"></path>
                                <circle cx="12" cy="12" r="3"></circle>

                            </svg>

                            <svg class="eye-closed"
                                 xmlns="http://www.w3.org/2000/svg"
                                 width="20"
                                 height="20"
                                 viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 stroke-linecap="round"
                                 stroke-linejoin="round">

                                <path d="M3 3l18 18"></path>
                                <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
                                <path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a17 17 0 0 1-2.1 3.2"></path>
                                <path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a9.8 9.8 0 0 0 4.1-.9"></path>

                            </svg>

                        </button>

                    </div>

                </div>

                <div class="form-group">

                    <label for="confirm_password">
                        Confirm Password <span class="required">*</span>
                    </label>

                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Confirm password"
                        required
                    >

                </div>

            </div>

            <div class="captcha-section">

                <label for="captcha">
                    Security Verification <span class="required">*</span>
                </label>

                <div class="captcha-row">

                    <div class="captcha-code">
                        {{ captcha }}
                    </div>

                    <input
                        type="text"
                        id="captcha"
                        name="captcha"
                        placeholder="Enter CAPTCHA"
                        autocomplete="off"
                        required
                    >

                </div>

                <p class="captcha-help">
                    Enter the characters shown above.
                </p>

            </div>

            <button type="submit" class="register-submit">
                Register Candidate
            </button>

        </form>

        <div class="register-footer">

            <p>
                Already registered?
                <a href="{{ url_for('login_page') }}">Login here</a>
            </p>

            <a href="{{ url_for('exam_entry') }}" class="back-link">
                ← Back to Exam Portal
            </a>

        </div>

    </div>

</main>

<script>

    function togglePassword(button) {

        const passwordInput = document.getElementById("password");
        const eyeOpen = button.querySelector(".eye-open");
        const eyeClosed = button.querySelector(".eye-closed");

        if (passwordInput.type === "password") {

            passwordInput.type = "text";

            eyeOpen.style.display = "none";
            eyeClosed.style.display = "block";

            button.setAttribute("aria-label", "Hide password");

        } else {

            passwordInput.type = "password";

            eyeOpen.style.display = "block";
            eyeClosed.style.display = "none";

            button.setAttribute("aria-label", "Show password");

        }

    }

</script>
```

</body>

</html>
